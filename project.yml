name: SideInstaller
options:
  # Brand reverse-DNS prefix. NOTE: this is a chosen handle only — it is NOT
  # tied to an Apple Developer account (DEVELOPMENT_TEAM stays empty below).
  bundleIdPrefix: com.thenullastris
  deploymentTarget:
    iOS: "27.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.5.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    # aws-lc-rs / idevice are arm64-only here; drop x86_64 sim slice.
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
    # Distribution hygiene: NO team is pinned. Whoever builds this must select
    # their OWN signing team in Xcode (Signing & Capabilities), which signs the
    # app with their account — never the original author's. Leave empty.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  SideInstaller:
    type: application
    platform: iOS
    sources:
      - path: ios-app
    dependencies:
      - framework: SideInstallerFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thenullastris.sideinstaller
        INFOPLIST_FILE: ios-app/Info.plist
        # idevice's static lib pulls in C++ symbols (aws-lc); link libc++.
        OTHER_LDFLAGS: "-lc++"
        GENERATE_INFOPLIST_FILE: NO
